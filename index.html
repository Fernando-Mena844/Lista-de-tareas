<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas - Fernando Mena</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    
    <main class="container py-5">
        <section class="card shadow rounded-4 mx-auto" style="max-width: 800px;">
            <div class="card-body py-4">
                <h1 class="text-center my-2">Lista de tareas</h1>
                <p class="text-center text-muted mb-4">Agregue tareas, marque las que completes, y elimine las que ya no necesite.</p>
                <div class="row g-3 mb-4">
                    <input type="text" id="txtTarea" class="form-control" placeholder="Escriba una tarea">
                    <div class="col-12 col-md-3">
                        <select id="prioridad" class="form-select">
                            <option value="" selected disabled hidden>Prioridad</option>
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-3 d-grid">
                        <button id="btnAgregar" class="btn btn-primary">
                            Agregar
                        </button>
                    </div>
                </div>
                <div id="listaTareas" class="d-flex flex-column gap-3">
                    <!-- Aquí se agregarán las tareas con JS -->

                </div>
                <p id="contador" class="text-center fw-bold text-secondary mt-4">
                    Tareas registradas: 0
                </p>
            </div>
        </section>
    </main>

    <!-- JS de SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Script de BootStrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- JS propio -->
     <script src="js/Controllers/index.controllers.js"></script>
</body>
</html>
